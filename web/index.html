<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Collect guest photos in one beautiful gallery for weddings, parties, and events.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Glamora">
  <link rel="apple-touch-icon" href="favicon.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Glamora</title>
  <link rel="manifest" href="manifest.json">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #F5F6FA;
    }

    #app-loader {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 12px;
      background: #F5F6FA;
      color: #111827;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      z-index: 9999;
      transition: opacity 220ms ease;
    }

    #app-loader.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loader-dot {
      width: 14px;
      height: 14px;
      border-radius: 999px;
      background: #E53935;
      animation: pulse 1s ease-in-out infinite;
    }

    .loader-text {
      font-size: 14px;
      color: #6B7280;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(0.8); opacity: 0.65; }
      50% { transform: scale(1.25); opacity: 1; }
    }
  </style>
</head>
<body>
  <div id="app-loader" aria-live="polite">
    <div class="loader-dot"></div>
    <div class="loader-text">Loading Glamora...</div>
  </div>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
  <script>
    (function () {
      var loader = document.getElementById('app-loader');
      if (!loader) return;

      function hideLoader() {
        if (!loader || loader.dataset.hidden === '1') return;
        loader.dataset.hidden = '1';
        loader.classList.add('hidden');
        setTimeout(function () {
          if (loader) loader.remove();
        }, 260);
      }

      // Normal success path from Flutter.
      window.addEventListener('flutter-first-frame', hideLoader);

      // Fail-safe for dev/hot-reload edge cases where first-frame is never fired.
      // Prevents the app from looking "stuck" on the HTML loader forever.
      setTimeout(hideLoader, 8000);
    })();
  </script>
</body>
</html>
